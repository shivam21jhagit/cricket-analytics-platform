services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      CRICAPI_KEY: ${CRICAPI_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./ml:/app/ml:ro
    depends_on:
      - redis
      - postgres
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      REACT_APP_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cricketai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cricketai_local}
      POSTGRES_DB: ${POSTGRES_DB:-cricketai}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-cricketai}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-cricketai_local}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  postgres-data:
  mongo-data:
